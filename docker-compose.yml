services:
  postgres:
    image: postgres:17-alpine
    container_name: artisanos_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: artisan
      POSTGRES_PASSWORD: artisan
      POSTGRES_DB: artisanos

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artisan -d artisanos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: artisanos_redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: artisanos_mailpit
    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:latest
    container_name: artisanos_minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: artisanos
      MINIO_ROOT_PASSWORD: artisanos-dev-password

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data: